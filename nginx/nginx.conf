events {
    worker_connections 1024;
}

http {
    upstream api {
        server api:3000;
    }

    upstream admin {
        server admin:80;
    }

    upstream pwa {
        server pwa:80;
    }

    # Admin Panel
    server {
        listen 80;
        server_name admin.reviewhub.ru;

        location / {
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # PWA Review Form
    server {
        listen 80;
        server_name review.reviewhub.ru;

        location / {
            proxy_pass http://pwa;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
