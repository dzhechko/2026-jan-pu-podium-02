events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    upstream api {
        server api:3000;
    }

    upstream admin {
        server admin:80;
    }

    upstream pwa {
        server pwa:80;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name admin.reviewhub.ru review.reviewhub.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Admin Panel (HTTPS)
    server {
        listen 443 ssl http2;
        server_name admin.reviewhub.ru;

        ssl_certificate /etc/letsencrypt/live/admin.reviewhub.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.reviewhub.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # PWA Review Form (HTTPS)
    server {
        listen 443 ssl http2;
        server_name review.reviewhub.ru;

        ssl_certificate /etc/letsencrypt/live/review.reviewhub.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/review.reviewhub.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass http://pwa;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
